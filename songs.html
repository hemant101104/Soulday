<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Songs 🎶</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
  body {
  background: url("images/musicbg.jpg") no-repeat center center fixed;
  background-size: cover;
  overflow-x: hidden;
}

/* Cursor on entire card */
.card {
  cursor: url("images/cursor.png"), default;
}

/* Cursor on play button */
.center-btn {
  cursor: url("images/cursor.png"), pointer;
}

/* Optional hover effect */
.center-btn:hover {
  transform: scale(1.2);
}

/* Gradient animation */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Glow effects */
body::before,
body::after {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.5;
  z-index: -1;
}

body::before {
  background: #ff6b9d;
  top: -100px;
  left: -100px;
}

body::after {
  background: #a18cd1;
  bottom: -100px;
  right: -100px;
}

    .card {
      position: absolute;
      width: 240px;
      height: 360px;
      border-radius: 30px;
      padding: 14px;
      backdrop-filter: blur(30px);
      background: rgba(30,30,30,0.75);
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      transition: all 0.4s ease;
    }

    .card:hover {
      transform: scale(1.08) rotate(0deg) !important;
      z-index: 10;
    }

    .art {
      width: 100%;
      height: 180px;
      border-radius: 20px;
      object-fit: cover;
    }

    .progress {
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress div {
      height: 100%;
      width: 40%;
      background: white;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      font-size: 20px;
    }

    .center-btn {
      font-size: 28px;
    }

    /* Positions */
    .c1 { top: 10%; left: 12%; transform: rotate(-12deg); }
    .c2 { top: 10%; right: 12%; transform: rotate(10deg); }
    .c3 { bottom: 10%; left: 18%; transform: rotate(-6deg); }
    .c4 { bottom: 10%; right: 18%; transform: rotate(8deg); }
  </style>
</head>

<body>

<!-- Card 1 -->
<div class="card c1">
  <img src="images/song3.png" class="art">
  <p class="text-white mt-3 text-sm opacity-80">iPhone</p>
  <p class="text-white text-lg font-semibold">Mere Nishaan</p>
  <p class="text-gray-300 text-sm">Darshan Raval</p>

  <!-- AUDIO -->
  <audio id="song1">

  </audio>

<div class="progress" onclick="seek(event, 'song1')">
  <div id="progress-song1"></div>
</div>
  <div class="controls">
    <span>⏮</span>
<span class="center-btn" id="btn-song1" onclick="playSong('song1','btn-song1')">▶</span>    <span>⏭</span>
  </div>
</div>

  <!-- Card 2 -->

  <p class="text-gray-300 text-sm">Mohit Chauhan</p>

  <audio id="song2">

  </audio>

  <div class="progress" onclick="seek(event, 'song2')">
    <div id="progress-song2"></div>
  </div>

  <div class="controls">
    <span>⏮</span>
    <span class="center-btn" id="btn-song2" onclick="playSong('song2','btn-song2')">▶</span>
    <span>⏭</span>

</div>

  <!-- Card 3 -->
  <div class="card c3">

  <p class="text-white mt-3 text-sm opacity-80">iPhone</p>
  <p class="text-white text-lg font-semibold">Darkhaast</p>
  <p class="text-gray-300 text-sm">Arijit Singh</p>

  <audio id="song3">

  </audio>

  <div class="progress" onclick="seek(event, 'song3')">

  <!-- Card 4 -->
<div class="card c4">

</div>

  <!-- NEXT BUTTON -->
  <div class="w-full text-center mt-[700px] mb-10">
    <button onclick="nextPage()" 
      class="px-8 py-3 bg-pink-500 text-white rounded-full shadow-lg hover:bg-pink-600 transition">
      Next Surprise → ✨
    </button>
  </div>

  <script>
  function nextPage() {
    window.location.href = "celebrate.html";
  }
</script>

 <script>
let currentSong = null;
let currentBtn = null;

// PLAY FUNCTION (already working)
function playSong(songId, btnId) {
  const song = document.getElementById(songId);
  const btn = document.getElementById(btnId);

  if (currentSong && currentSong !== song) {
    currentSong.pause();
    currentSong.currentTime = 0;
    if (currentBtn) currentBtn.innerText = "▶";
  }

  if (song.paused) {
    song.play();
    btn.innerText = "⏸";
    currentSong = song;
    currentBtn = btn;

    updateProgress(songId);
  } else {
    song.pause();
    btn.innerText = "▶";
  }

  song.onended = () => {
    btn.innerText = "▶";
  };
}

// 🔥 UPDATE PROGRESS BAR
function updateProgress(songId) {
  const song = document.getElementById(songId);
  const bar = document.getElementById("progress-" + songId);

  song.ontimeupdate = () => {
    if (song.duration) {
      const percent = (song.currentTime / song.duration) * 100;
      bar.style.width = percent + "%";
    }
  };
}

// 🔥 SEEK FUNCTION (click to jump)
function seek(e, songId) {
  const song = document.getElementById(songId);
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;

  const percent = x / width;
  song.currentTime = percent * song.duration;
}
</script>

</body>
</html>
